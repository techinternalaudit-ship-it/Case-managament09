services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: vigilance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vigilance_secure_pwd_2026}
      POSTGRES_DB: vigilance
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilance"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://vigilance:${DB_PASSWORD:-vigilance_secure_pwd_2026}@db:5432/vigilance
      NODE_ENV: production

volumes:
  pgdata:
